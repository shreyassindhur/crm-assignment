<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Ticket &mdash; Ticket-CRM</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="bg-gradient-to-br from-slate-50 to-slate-100 min-h-screen">
  <nav class="bg-white shadow-sm border-b border-slate-200">
    <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between items-center h-16">
        <div class="flex items-center gap-3">
          <div class="w-8 h-8 bg-teal-600 rounded-lg flex items-center justify-center">
            <i class="fa-solid fa-headset text-white text-sm"></i>
          </div>
          <span class="text-xl font-bold text-slate-800">Ticket-CRM</span>
        </div>
        <a href="/static/index.html" class="text-sm text-slate-600 hover:text-slate-800 flex items-center gap-1">
          <i class="fa-solid fa-arrow-left"></i> Back to Tickets
        </a>
      </div>
    </div>
  </nav>

  <main class="max-w-2xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
      <div class="p-6 border-b border-slate-100">
        <h1 class="text-2xl font-bold text-slate-800">Create Support Ticket</h1>
        <p class="text-sm text-slate-500 mt-1">Fill in the details below to create a new support ticket.</p>
      </div>

      <form id="ticketForm" class="p-6 space-y-5" novalidate>
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
          <div>
            <label for="customer_name" class="block text-sm font-medium text-slate-700 mb-1.5">Customer Name</label>
            <input type="text" id="customer_name" name="customer_name" required
                   class="w-full px-4 py-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-teal-500 focus:border-teal-500 text-sm"
                   placeholder="John Doe">
          </div>
          <div>
            <label for="customer_email" class="block text-sm font-medium text-slate-700 mb-1.5">Customer Email</label>
            <input type="email" id="customer_email" name="customer_email" required
                   class="w-full px-4 py-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-teal-500 focus:border-teal-500 text-sm"
                   placeholder="john@example.com">
          </div>
        </div>

        <div>
          <label for="subject" class="block text-sm font-medium text-slate-700 mb-1.5">Subject</label>
          <input type="text" id="subject" name="subject" required
                 class="w-full px-4 py-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-teal-500 focus:border-teal-500 text-sm"
                 placeholder="Brief issue title">
        </div>

        <div>
          <label for="description" class="block text-sm font-medium text-slate-700 mb-1.5">Description</label>
          <textarea id="description" name="description" rows="5" required
                    class="w-full px-4 py-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-teal-500 focus:border-teal-500 text-sm resize-y"
                    placeholder="Detailed description of the issue..."></textarea>
        </div>

        <div id="errorMessage" class="hidden bg-red-50 border border-red-200 text-red-700 text-sm rounded-lg p-3"></div>

        <div class="flex items-center gap-3 pt-2">
          <button type="submit" id="submitBtn"
                  class="bg-teal-600 text-white px-6 py-2.5 rounded-lg hover:bg-teal-700 transition-all text-sm font-medium shadow-sm flex items-center gap-2">
            <i class="fa-solid fa-ticket"></i> <span id="submitBtnText">Create Ticket</span>
          </button>
          <a href="/static/index.html" class="text-sm text-slate-500 hover:text-slate-700 px-4 py-2.5">Cancel</a>
        </div>
      </form>
    </div>
  </main>

  <div id="successModal" class="fixed inset-0 bg-black/40 flex items-center justify-center hidden z-50">
    <div class="bg-white rounded-xl shadow-xl max-w-md w-full mx-4 p-6 text-center">
      <div class="w-16 h-16 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-4">
        <i class="fa-solid fa-check text-green-600 text-2xl"></i>
      </div>
      <h3 class="text-xl font-bold text-slate-800 mb-1">Ticket Created!</h3>
      <p class="text-sm text-slate-500 mb-2">Your ticket has been created successfully.</p>
      <p class="text-2xl font-mono font-bold text-teal-600 mb-6" id="newTicketId"></p>
      <div class="flex gap-3 justify-center">
        <a href="/static/create.html" class="px-5 py-2.5 border border-slate-300 rounded-lg text-sm text-slate-700 hover:bg-slate-50">Create Another</a>
        <a href="/static/index.html" class="px-5 py-2.5 bg-teal-600 text-white rounded-lg text-sm hover:bg-teal-700">View All Tickets</a>
      </div>
    </div>
  </div>

  <script>
    const form = document.getElementById('ticketForm');
    const submitBtn = document.getElementById('submitBtn');
    const submitBtnText = document.getElementById('submitBtnText');
    const errorMessage = document.getElementById('errorMessage');
    const successModal = document.getElementById('successModal');
    const newTicketId = document.getElementById('newTicketId');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorMessage.classList.add('hidden');
      submitBtn.disabled = true;
      submitBtnText.textContent = 'Creating...';

      const formData = {
        customer_name: document.getElementById('customer_name').value.trim(),
        customer_email: document.getElementById('customer_email').value.trim(),
        subject: document.getElementById('subject').value.trim(),
        description: document.getElementById('description').value.trim(),
      };

      try {
        const res = await fetch('/api/tickets', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(formData),
        });

        if (!res.ok) {
          const err = await res.json();
          throw new Error(err.detail || 'Failed to create ticket');
        }

        const data = await res.json();
        newTicketId.textContent = data.ticket_id;
        successModal.classList.remove('hidden');
        form.reset();
      } catch (err) {
        errorMessage.textContent = err.message;
        errorMessage.classList.remove('hidden');
      } finally {
        submitBtn.disabled = false;
        submitBtnText.textContent = 'Create Ticket';
      }
    });

    successModal.addEventListener('click', (e) => {
      if (e.target === successModal) {
        successModal.classList.add('hidden');
      }
    });
  </script>

  <footer class="text-center py-6 text-xs text-slate-400 border-t border-slate-200 mt-8">
    Ticket-CRM &mdash; Built by Shreyas Sindhur
  </footer>
</body>
</html>
