<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tickets &mdash; Ticket-CRM</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="bg-gradient-to-br from-slate-50 to-slate-100 min-h-screen">
  <nav class="bg-white shadow-sm border-b border-slate-200">
    <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between items-center h-16">
        <div class="flex items-center gap-3">
          <div class="w-8 h-8 bg-teal-600 rounded-lg flex items-center justify-center">
            <i class="fa-solid fa-headset text-white text-sm"></i>
          </div>
          <span class="text-xl font-bold text-slate-800">Ticket-CRM</span>
        </div>
        <a href="/static/create.html"
           class="bg-teal-600 text-white px-5 py-2.5 rounded-lg hover:bg-teal-700 transition-all text-sm font-medium shadow-sm flex items-center gap-2">
          <i class="fa-solid fa-plus"></i> New Ticket
        </a>
      </div>
    </div>
  </nav>

  <main class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
      <div class="p-6 border-b border-slate-100">
        <div class="flex flex-col sm:flex-row gap-4 items-stretch sm:items-center">
          <div class="relative flex-1">
            <i class="fa-solid fa-search absolute left-3.5 top-1/2 -translate-y-1/2 text-slate-400 text-sm"></i>
            <input type="text" id="searchInput" placeholder="Search tickets by name, ID, email, or subject..."
                   class="w-full pl-10 pr-4 py-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-teal-500 focus:border-teal-500 text-sm">
          </div>
          <div class="flex gap-2">
            <select id="statusFilter" class="px-4 py-2.5 border border-slate-300 rounded-lg text-sm bg-white focus:ring-2 focus:ring-teal-500">
              <option value="all">All Status</option>
              <option value="Open">Open</option>
              <option value="In Progress">In Progress</option>
              <option value="Closed">Closed</option>
            </select>
          </div>
        </div>
      </div>

      <div id="loadingState" class="text-center py-16 text-slate-400">
        <i class="fa-solid fa-spinner fa-spin text-3xl mb-3"></i>
        <p class="text-sm">Loading tickets...</p>
      </div>

      <div id="emptyState" class="text-center py-16 hidden">
        <div class="w-16 h-16 bg-slate-100 rounded-full flex items-center justify-center mx-auto mb-4">
          <i class="fa-solid fa-ticket text-slate-300 text-xl"></i>
        </div>
        <h3 class="text-lg font-medium text-slate-600 mb-1">No tickets found</h3>
        <p class="text-sm text-slate-400 mb-4">Create your first support ticket to get started.</p>
        <a href="/static/create.html" class="inline-flex items-center gap-2 bg-teal-600 text-white px-5 py-2.5 rounded-lg hover:bg-teal-700 transition-all text-sm font-medium">
          <i class="fa-solid fa-plus"></i> Create Ticket
        </a>
      </div>

      <div id="ticketsContainer" class="hidden">
        <table class="w-full">
          <thead>
            <tr class="bg-slate-50 text-left text-xs font-semibold text-slate-500 uppercase tracking-wider">
              <th class="px-6 py-4">Ticket ID</th>
              <th class="px-6 py-4">Customer</th>
              <th class="px-6 py-4">Subject</th>
              <th class="px-6 py-4">Status</th>
              <th class="px-6 py-4">Date</th>
              <th class="px-6 py-4 text-right">Action</th>
            </tr>
          </thead>
          <tbody id="ticketsBody" class="divide-y divide-slate-100"></tbody>
        </table>
      </div>
    </div>
  </main>

  <script>
    const searchInput = document.getElementById('searchInput');
    const statusFilter = document.getElementById('statusFilter');
    const ticketsBody = document.getElementById('ticketsBody');
    const loadingState = document.getElementById('loadingState');
    const emptyState = document.getElementById('emptyState');
    const ticketsContainer = document.getElementById('ticketsContainer');

    let debounceTimer;

    function getStatusBadge(status) {
      const colors = {
        'Open': 'bg-yellow-100 text-yellow-800 border-yellow-200',
        'In Progress': 'bg-blue-100 text-blue-800 border-blue-200',
        'Closed': 'bg-green-100 text-green-800 border-green-200',
      };
      return `<span class="inline-flex items-center px-2.5 py-1 rounded-full text-xs font-medium border ${colors[status] || colors['Open']}">${status}</span>`;
    }

    function formatDate(dateStr) {
      return new Date(dateStr).toLocaleDateString('en-US', {
        month: 'short', day: 'numeric', year: 'numeric',
        hour: '2-digit', minute: '2-digit'
      });
    }

    async function fetchTickets() {
      const params = new URLSearchParams();
      const search = searchInput.value.trim();
      const status = statusFilter.value;
      if (search) params.set('search', search);
      if (status && status !== 'all') params.set('status', status);

      loadingState.classList.remove('hidden');
      emptyState.classList.add('hidden');
      ticketsContainer.classList.add('hidden');

      try {
        const res = await fetch(`/api/tickets?${params}`);
        const tickets = await res.json();
        loadingState.classList.add('hidden');

        if (tickets.length === 0) {
          emptyState.classList.remove('hidden');
          return;
        }

        ticketsContainer.classList.remove('hidden');
        ticketsBody.innerHTML = tickets.map(t => `
          <tr class="hover:bg-slate-50 transition-colors">
            <td class="px-6 py-4">
              <span class="font-mono text-sm font-medium text-teal-600">${t.ticket_id}</span>
            </td>
            <td class="px-6 py-4">
              <div class="text-sm font-medium text-slate-800">${t.customer_name}</div>
            </td>
            <td class="px-6 py-4">
              <div class="text-sm text-slate-600 truncate max-w-xs">${t.subject}</div>
            </td>
            <td class="px-6 py-4">${getStatusBadge(t.status)}</td>
            <td class="px-6 py-4 text-sm text-slate-500 whitespace-nowrap">${formatDate(t.created_at)}</td>
            <td class="px-6 py-4 text-right">
              <a href="/static/ticket.html?id=${t.ticket_id}"
                 class="inline-flex items-center gap-1 text-sm text-teal-600 hover:text-teal-800 font-medium">
                View <i class="fa-solid fa-arrow-right text-xs"></i>
              </a>
            </td>
          </tr>
        `).join('');
      } catch (err) {
        loadingState.classList.add('hidden');
        ticketsContainer.classList.remove('hidden');
        ticketsBody.innerHTML = `<tr><td colspan="6" class="px-6 py-8 text-center text-red-500">Failed to load tickets. Please try again.</td></tr>`;
      }
    }

    searchInput.addEventListener('input', () => {
      clearTimeout(debounceTimer);
      debounceTimer = setTimeout(fetchTickets, 300);
    });

    statusFilter.addEventListener('change', fetchTickets);

    fetchTickets();
  </script>

  <footer class="text-center py-6 text-xs text-slate-400 border-t border-slate-200 mt-8">
    Ticket-CRM &mdash; Built by Shreyas Sindhur
  </footer>
</body>
</html>
