<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ticket Detail &mdash; Ticket-CRM</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="bg-gradient-to-br from-slate-50 to-slate-100 min-h-screen">
  <nav class="bg-white shadow-sm border-b border-slate-200">
    <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between items-center h-16">
        <div class="flex items-center gap-3">
          <div class="w-8 h-8 bg-teal-600 rounded-lg flex items-center justify-center">
            <i class="fa-solid fa-headset text-white text-sm"></i>
          </div>
          <span class="text-xl font-bold text-slate-800">Ticket-CRM</span>
        </div>
        <a href="/static/index.html" class="text-sm text-slate-600 hover:text-slate-800 flex items-center gap-1">
          <i class="fa-solid fa-arrow-left"></i> Back to Tickets
        </a>
      </div>
    </div>
  </nav>

  <main class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    <div id="loadingState" class="text-center py-16 text-slate-400">
      <i class="fa-solid fa-spinner fa-spin text-3xl mb-3"></i>
      <p class="text-sm">Loading ticket...</p>
    </div>

    <div id="errorState" class="hidden text-center py-16">
      <div class="w-16 h-16 bg-red-50 rounded-full flex items-center justify-center mx-auto mb-4">
        <i class="fa-solid fa-exclamation-triangle text-red-400 text-xl"></i>
      </div>
      <h3 class="text-lg font-medium text-slate-600 mb-1">Ticket not found</h3>
      <p class="text-sm text-slate-400 mb-4">The ticket you're looking for doesn't exist.</p>
      <a href="/static/index.html" class="text-teal-600 hover:text-teal-800 text-sm font-medium">Back to all tickets</a>
    </div>

    <div id="ticketContent" class="hidden space-y-6">
      <!-- Header -->
      <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
        <div class="p-6">
          <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-6">
            <div>
              <h1 class="text-2xl font-bold text-slate-800" id="ticketSubject"></h1>
              <p class="text-sm text-slate-500 mt-1">
                <span class="font-mono font-medium text-teal-600" id="ticketId"></span>
                <span class="mx-2">·</span>
                Created <span id="ticketCreatedAt"></span>
              </p>
            </div>
            <div class="flex items-center gap-3">
              <select id="statusSelect"
                      class="px-4 py-2.5 border border-slate-300 rounded-lg text-sm bg-white focus:ring-2 focus:ring-teal-500">
                <option value="Open">Open</option>
                <option value="In Progress">In Progress</option>
                <option value="Closed">Closed</option>
              </select>
              <button id="updateStatusBtn"
                      class="bg-teal-600 text-white px-4 py-2.5 rounded-lg hover:bg-teal-700 transition-all text-sm font-medium">
                Update
              </button>
            </div>
          </div>

          <div class="grid grid-cols-1 sm:grid-cols-2 gap-6 p-4 bg-slate-50 rounded-lg">
            <div>
              <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1">Customer Name</label>
              <p class="text-sm font-medium text-slate-800" id="customerName"></p>
            </div>
            <div>
              <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1">Customer Email</label>
              <p class="text-sm font-medium text-slate-800" id="customerEmail"></p>
            </div>
          </div>

          <div class="mt-6">
            <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">Description</label>
            <p class="text-sm text-slate-700 leading-relaxed whitespace-pre-wrap" id="ticketDescription"></p>
          </div>

          <div class="mt-4">
            <span id="statusBadge" class="inline-flex items-center px-3 py-1 rounded-full text-xs font-medium border"></span>
          </div>
        </div>
      </div>

      <!-- Notes Section -->
      <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
        <div class="p-6 border-b border-slate-100">
          <h2 class="text-lg font-bold text-slate-800 flex items-center gap-2">
            <i class="fa-solid fa-comment text-slate-400"></i> Notes & Updates
          </h2>
        </div>

        <div class="p-6 border-b border-slate-100">
          <div class="flex gap-3">
            <textarea id="noteInput" rows="3"
                      class="flex-1 px-4 py-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-teal-500 focus:border-teal-500 text-sm resize-y"
                      placeholder="Add a note to this ticket..."></textarea>
          </div>
          <div class="flex justify-end mt-3">
            <button id="addNoteBtn"
                    class="bg-teal-600 text-white px-5 py-2 rounded-lg hover:bg-teal-700 transition-all text-sm font-medium flex items-center gap-2">
              <i class="fa-solid fa-plus"></i> Add Note
            </button>
          </div>
        </div>

        <div id="notesContainer" class="divide-y divide-slate-100">
          <div class="p-6 text-center text-sm text-slate-400">No notes yet.</div>
        </div>
      </div>
    </div>
  </main>

  <div id="toast" class="fixed bottom-6 right-6 bg-slate-800 text-white text-sm px-5 py-3 rounded-lg shadow-lg hidden transition-all z-50"></div>

  <script>
    const ticketId = new URLSearchParams(window.location.search).get('id');
    if (!ticketId) {
      window.location.href = '/static/index.html';
    }

    const loadingState = document.getElementById('loadingState');
    const errorState = document.getElementById('errorState');
    const ticketContent = document.getElementById('ticketContent');

    function showToast(message) {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.classList.remove('hidden');
      setTimeout(() => toast.classList.add('hidden'), 3000);
    }

    function getStatusBadge(status) {
      const colors = {
        'Open': 'bg-yellow-100 text-yellow-800 border-yellow-200',
        'In Progress': 'bg-blue-100 text-blue-800 border-blue-200',
        'Closed': 'bg-green-100 text-green-800 border-green-200',
      };
      return `<span class="inline-flex items-center px-2.5 py-1 rounded-full text-xs font-medium border ${colors[status] || colors['Open']}">${status}</span>`;
    }

    function formatDate(dateStr) {
      return new Date(dateStr).toLocaleDateString('en-US', {
        month: 'short', day: 'numeric', year: 'numeric',
        hour: '2-digit', minute: '2-digit'
      });
    }

    async function loadTicket() {
      loadingState.classList.remove('hidden');
      errorState.classList.add('hidden');
      ticketContent.classList.add('hidden');

      try {
        const res = await fetch(`/api/tickets/${ticketId}`);
        if (!res.ok) throw new Error('Not found');
        const ticket = await res.json();

        loadingState.classList.add('hidden');
        ticketContent.classList.remove('hidden');

        document.getElementById('ticketSubject').textContent = ticket.subject;
        document.getElementById('ticketId').textContent = ticket.ticket_id;
        document.getElementById('ticketCreatedAt').textContent = formatDate(ticket.created_at);
        document.getElementById('customerName').textContent = ticket.customer_name;
        document.getElementById('customerEmail').textContent = ticket.customer_email;
        document.getElementById('ticketDescription').textContent = ticket.description || 'No description provided.';
        document.getElementById('statusBadge').innerHTML = getStatusBadge(ticket.status);
        document.getElementById('statusSelect').value = ticket.status;

        renderNotes(ticket.notes);
      } catch (err) {
        loadingState.classList.add('hidden');
        errorState.classList.remove('hidden');
      }
    }

    function renderNotes(notes) {
      const container = document.getElementById('notesContainer');
      if (!notes || notes.length === 0) {
        container.innerHTML = '<div class="p-6 text-center text-sm text-slate-400">No notes yet.</div>';
        return;
      }
      container.innerHTML = notes.map(n => `
        <div class="p-5">
          <div class="flex items-start gap-3">
            <div class="w-8 h-8 bg-teal-100 rounded-full flex items-center justify-center flex-shrink-0">
              <i class="fa-solid fa-user text-teal-600 text-xs"></i>
            </div>
            <div class="flex-1 min-w-0">
              <div class="text-sm text-slate-700 whitespace-pre-wrap">${n.note_text}</div>
              <p class="text-xs text-slate-400 mt-1">${formatDate(n.created_at)}</p>
            </div>
          </div>
        </div>
      `).join('');
    }

    document.getElementById('updateStatusBtn').addEventListener('click', async () => {
      const newStatus = document.getElementById('statusSelect').value;
      try {
        const res = await fetch(`/api/tickets/${ticketId}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ status: newStatus }),
        });
        if (!res.ok) throw new Error('Failed to update');
        showToast('Status updated successfully');
        document.getElementById('statusBadge').innerHTML = getStatusBadge(newStatus);
      } catch (err) {
        showToast('Failed to update status');
      }
    });

    document.getElementById('addNoteBtn').addEventListener('click', async () => {
      const noteInput = document.getElementById('noteInput');
      const text = noteInput.value.trim();
      if (!text) return;

      try {
        const res = await fetch(`/api/tickets/${ticketId}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ notes: text }),
        });
        if (!res.ok) throw new Error('Failed to add note');
        noteInput.value = '';
        showToast('Note added successfully');
        loadTicket();
      } catch (err) {
        showToast('Failed to add note');
      }
    });

    loadTicket();
  </script>

  <footer class="text-center py-6 text-xs text-slate-400 border-t border-slate-200 mt-8">
    Ticket-CRM &mdash; Built by Shreyas Sindhur
  </footer>
</body>
</html>
